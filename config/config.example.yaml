# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║                     ShadowOps Bot - Configuration                         ║
# ║                                                                           ║
# ║  WICHTIG: Kopiere diese Datei zu config.yaml und fülle deine Werte ein.   ║
# ║  Secrets (Token, API Keys) sollten als Umgebungsvariablen gesetzt werden. ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║ DISCORD SETTINGS                                                          ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
discord:
  # Bot Token. Sollte als Umgebungsvariable DISCORD_BOT_TOKEN gesetzt werden.
  # https://discord.com/developers/applications
  token: "" # Env: DISCORD_BOT_TOKEN

  # Discord Server (Guild) ID
  # Rechtsklick auf Server → "ID kopieren" (Developer Mode aktivieren!)
  guild_id: 0

# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║ DISCORD CHANNELS                                                          ║
# ║ Rechtsklick auf Channel → "ID kopieren"                                  ║
# ║ Alle Channels sind optional - Fallback zu 'critical' wenn nicht gesetzt  ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
channels:
  # === HAUPT-CHANNELS ===

  # 🔴 Kritische Alerts (PFLICHT - Fallback für alle anderen)
  critical: 0

  # 🛡️ Alternative: security_alerts (wenn critical nicht gesetzt)
  # security_alerts: 0

  # 🤖 Bot-Status-Updates (Startup, Shutdown, Errors)
  bot_status: 0

  # === PROJEKT-SPEZIFISCHE CHANNELS ===

  # 🔐 Sicherheitstool-Projekt
  sicherheitsdienst: 0

  # ⚡ Nexus-Projekt
  nexus: 0

  # === TOOL-SPEZIFISCHE CHANNELS ===

  # 🚫 Fail2ban Alerts (IP-Bans)
  fail2ban: 0

  # 🛡️ CrowdSec Alerts (AI-basierte Threat Detection)
  crowdsec: 0

  # 🐳 Docker Security Scans (Trivy)
  docker: 0

  # 💾 Backup Status
  backups: 0

  # 📁 AIDE File Integrity Monitoring
  aide: 0

  # 🔑 SSH Anomalien
  ssh: 0

  # 📊 Performance Monitoring (optional)
  performance: 0

# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║ AUTO-REMEDIATION SYSTEM                                                   ║
# ║ Autonome Behebung von Security-Issues durch KI                           ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
auto_remediation:
  # System aktivieren (true/false)
  enabled: true

  # === BETRIEBSMODUS ===
  # dry_run: Nur Simulation, keine echten Änderungen (EMPFOHLEN für Tests!)
  dry_run: true

  # approval_mode: Wie viel manuelle Genehmigung wird benötigt?
  # - "paranoid": Frage bei JEDEM Event (Maximum Safety)
  # - "auto": Nur bei CRITICAL fragen, REST automatisch
  # - "dry_run": Nur Logging, keine Execution
  approval_mode: "paranoid"

  # === SCAN-INTERVALLE (in Sekunden) ===
  scan_intervals:
    trivy: 21600      # 6 Stunden - Docker Security Scans
    crowdsec: 30      # 30 Sekunden - Echtzeit Threat Detection
    fail2ban: 30      # 30 Sekunden - IP-Ban Monitoring
    aide: 900         # 15 Minuten - File Integrity Checks

  # === DISCORD ACTIVITY LOGS ===
  # Sendet periodische "Scan OK" Meldungen in den Bot-Status-Channel.
  activity_logs_enabled: true
  activity_log_seconds: 3600

  # === CIRCUIT BREAKER (Verhindert Endlos-Loops) ===
  circuit_breaker_threshold: 5    # Max 5 Fehler...
  circuit_breaker_timeout: 3600   # ...dann 1h Pause

  # === RETRY-LOGIC ===
  max_retry_attempts: 3  # Maximal 3 Versuche pro Fix

  # === AUTO-CHANNEL-CREATION ===
  # Soll der Bot fehlende Discord-Channels automatisch erstellen?
  auto_create_channels: true

  # Channel-Namen (wenn auto_create_channels = true)
  channel_names:
    alerts: "🤖-auto-remediation-alerts"
    approvals: "✋-auto-remediation-approvals"
    stats: "📊-auto-remediation-stats"
    ai_learning: "🧠-ai-learning"
    code_fixes: "🔧-code-fixes"
    orchestrator: "🎯-orchestrator"

  # === NOTIFICATION CHANNELS (werden auto-erstellt oder manuell gesetzt) ===
  notifications:
    alerts_channel: 0         # Alerts & Status-Updates
    approvals_channel: 0      # Approval-Requests
    stats_channel: 0          # Statistiken & Erfolgsraten
    ai_learning_channel: 0    # AI-Learning-Insights
    code_fixes_channel: 0     # Code-Fix-Details
    orchestrator_channel: 0   # Orchestrator-Details

# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║ AI SERVICES (KI-gestützte Analyse)                                       ║
# ║ Dual-Engine: Codex CLI (Primary) + Claude CLI (Fallback)                ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
ai:
  # Globales AI-Toggle (deaktiviert alle AI-Features inkl. Remediation/Queue/Learning)
  enabled: true

  # === CODEX CLI (PRIMARY — OpenAI Codex via CLI) ===
  codex:
    # Pfad zur Codex CLI (Standard: im PATH)
    cli_path: "codex"
    # Modelle nach Geschwindigkeit
    models:
      fast: "gpt-5.3-codex"       # Schnelle Analysen
      standard: "gpt-5.3-codex"   # Standard-Analysen + Structured Output
      thinking: "o3"              # Komplexe Planungsaufgaben

  # === CLAUDE CLI (FALLBACK — Anthropic Claude via CLI) ===
  claude:
    # Pfad zur Claude CLI
    cli_path: "/home/cmdshadow/.local/bin/claude"
    # Modelle nach Geschwindigkeit
    models:
      fast: "claude-sonnet-4-6"    # Schnelle Analysen
      standard: "claude-sonnet-4-6" # Standard-Analysen
      thinking: "claude-opus-4-6"  # Security Analyst Sessions

  # === TIMEOUTS ===
  timeouts:
    codex_seconds: 300   # 5 Min für Codex CLI
    claude_seconds: 300  # 5 Min für Claude CLI
    analyst_seconds: 1800 # 30 Min für Security Analyst Sessions

# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║ SECURITY ANALYST (Autonomer AI Security Engineer)                        ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
security_analyst:
  enabled: true
  database_dsn: "postgresql://security_analyst:SICHERES_PASSWORT@127.0.0.1:5433/security_analyst"
  max_sessions_per_day: 1           # Basis-Limit (dynamisch erhoehbar bei Backlog)
  model: "gpt-5.3-codex"            # Primaeres Modell (Codex)
  fallback_model: "claude-opus-4-6"  # Fallback-Modell (Claude)
  # Adaptive Steuerung: >=20 Findings → bis 3 Sessions, 5-19 → bis 2, 1-4 → 1, 0 → maintenance
  # Knowledge-Decay: -5%/Lauf bei Wissen >14 Tage alt (Minimum: 20%)
  # Fix-Verifikation: Letzte 14 Tage, max 10 Fixes pro Session
  # Doku: docs/SECURITY_ANALYST.md

# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║ AI LEARNING (Patch Notes Training + A/B Testing)                         ║
# ║ Aktiviert: Trainierte Prompts, Few-Shot Beispiele, Feedback-Loop        ║
# ║ Deaktiviert: Fallback-Prompt ohne Training (geringere Qualitaet)        ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
ai_learning:
  enabled: true  # EMPFOHLEN: Aktiviert A/B-Testing, Learning-DB, Feedback-Loop

# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║ PROJECTS (Überwachte Projekte)                                           ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
projects:
  # === SICHERHEITSTOOL ===
  sicherheitstool:
    enabled: true
    tag: "[SECURITY]"
    color: 0xFF0000  # Rot
    path: "/home/cmdshadow/project/sicherheitstool"
    services:
      - "sicherheitstool"
    critical: true  # Kritisches Projekt - höchste Priorität

  # === GUILDSCOUT ===
  guildscout:
    enabled: true
    tag: "[GUILDSCOUT]"
    color: 0x9B59B6  # Lila
    path: "/home/cmdshadow/project/GuildScout"
    services:
      - "guildscout"
    critical: false
    update_channel_name: "guildscout-updates" # Optional: Channel name for customer-facing patch notes. Wird auto. erstellt.

    # === CROSS-GUILD CHANNELS (optional) ===
    # Wenn Patch Notes auf einem ANDEREN Discord-Server gepostet werden sollen
    # (nicht dem Haupt-Guild), Channel-IDs direkt setzen. Auto-Creation wird dann uebersprungen.
    # update_channel_id: 0             # Oeffentlicher Patch-Notes-Channel (read-only)
    # internal_channel_id: 0           # Interner Channel (read-only, mit Rollen-Ping)
    # internal_channel_role_mention: 0 # Discord Role-ID fuer Ping im internen Channel

    # === PATCH NOTES V2 ===
    patch_notes:
      enabled: true
      language: "de"           # de oder en
      use_ai: true             # KI-generierte Patch Notes
      use_advanced_system: false # CHANGELOG-basiertes System
      use_critical_model: true  # Besseres AI-Modell für Patch Notes

      # Changelog-URL für Discord-Link (optional)
      # changelog_url: "https://guildscout.gg/changelog"

      # Web-Export: SEO-optimiertes JSON + Markdown
      changelog_output_dir: "" # Leer = Default (~/.shadowops/changelogs/guildscout/)

      # === RELEASE-STEUERUNG ===
      # Commits ohne Version-Bump werden gesammelt und per Cron/manuell released
      batch_threshold: 8       # Legacy (nicht mehr für auto-release genutzt)
      emergency_threshold: 20  # Notbremse: Auto-Release bei ≥20 Commits
      cron_day: sunday          # Wöchentlicher Release-Tag
      cron_hour: 20             # Uhrzeit (UTC)
      cron_min_commits: 3       # Minimum Commits für wöchentlichen Release

      # API-Endpoint für DB-basierte Changelogs (primärer Modus)
      # api_endpoint:
      #   url: "https://guildscout.eu/api/v2/changelogs"
      #   api_key: ""

      # Code-Diffs in Prompt einbeziehen (optional)
      include_diffs: true
      diff_max_commits: 5
      diff_max_lines: 200

      # Kontext-Dateien für reichere Prompts (optional)
      # context_files:
      #   - "docs/CHANGELOG.md"
      #   - "README.md"
      # context_max_chars: 1500
      # context_total_max_chars: 4000

  # === NEXUS ===
  nexus:
    enabled: true
    tag: "[NEXUS]"
    color: 0x00FF00  # Grün
    path: "/home/cmdshadow/project/nexus"
    services:
      - "nexus"
    critical: false

  # === SHADOWOPS-BOT (dieser Bot selbst) ===
  shadowops-bot:
    enabled: true
    tag: "[SHADOWOPS]"
    color: 0x0099FF  # Blau
    path: "/home/cmdshadow/shadowops-bot"
    services:
      - "shadowops-bot"
    critical: true  # Kritisch - Bot muss immer laufen!
    update_channel_id: 0  # Discord Channel-ID fuer Patch Notes + Feedback-Buttons

    patch_notes:
      language: "de"
      use_ai: true

# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║ ALERTS & NOTIFICATIONS                                                    ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
alerts:
  # Minimale Severity für Alerts
  # Optionen: "LOW", "MEDIUM", "HIGH", "CRITICAL"
  min_severity: "HIGH"

  # Rate-Limiting: Sekunden zwischen gleichen Alerts
  rate_limit_seconds: 60

  # Role-Mentions (Discord-Rollen die bei Alerts erwähnt werden)
  mention_roles:
    critical: 0  # Role-ID für CRITICAL Alerts
    high: 0      # Role-ID für HIGH Alerts

# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║ LOG PATHS (Pfade zu System-Logs)                                         ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
log_paths:
  # === ERFORDERLICH ===
  fail2ban: "/var/log/fail2ban/fail2ban.log"
  docker_scans: "/var/log/trivy-scans"

  # === OPTIONAL ===
  crowdsec: "/var/log/crowdsec/crowdsec.log"
  aide: "/var/log/aide/aide.log"
  ssh: "/var/log/auth.log"

# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║ BOT SETTINGS                                                              ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
bot:
  # Discord-Bot-Status (wird als "Playing..." angezeigt)
  status: "🔒 Monitoring Security"

  # Debug-Modus (mehr Logs, für Entwicklung)
  debug: false

  # Auto-Reconnect bei Verbindungsverlust
  auto_reconnect: true

# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║ PERMISSIONS                                                               ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
permissions:
  # Admin Discord-User-IDs (können alle Commands nutzen)
  # Rechtsklick auf User → "ID kopieren"
  admins:
    - 0  # Deine Discord User ID hier eintragen

# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║ ZENTRALE CHANGELOG-API                                                    ║
# ║ ShadowOps Bot stellt eine zentrale REST API fuer Changelogs bereit.      ║
# ║ Alle Projekte koennen per GET lesen, POST erfordert den API-Key.         ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
changelog_api:
  enabled: true
  api_key: "CHANGE_ME_RANDOM_STRING"  # Authentifizierung fuer POST Requests

# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║ ENDE DER KONFIGURATION                                                   ║
# ║                                                                           ║
# ║ NÄCHSTE SCHRITTE:                                                        ║
# ║ 1. Kopiere diese Datei: cp config/config.example.yaml config/config.yaml║
# ║ 2. Fülle deine Werte ein (guild_id, Channel IDs, etc.)                  ║
# ║ 3. Setze Secrets als Umgebungsvariablen (z.B. DISCORD_BOT_TOKEN)        ║
# ║ 4. Starte Bot: python3 src/bot.py                                       ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
